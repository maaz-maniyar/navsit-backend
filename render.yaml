services:
  - type: web
    name: navsit
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/nodes
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: NLP_PARSE_URL
        sync: false
